<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主页 | 黄韵锦</title>
    <link rel="stylesheet" href="style.css">
    <!-- 添加字体图标库，用于漂亮图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- 动态背景 -->
    <div class="gradient-bg">
        <div class="gradient-sphere"></div>
        <div class="gradient-sphere"></div>
        <div class="gradient-sphere"></div>
    </div>

    <!-- 主内容 -->
    <div class="container fade-in">
        <!-- 头像区域 -->
    <div class="avatar-wrapper">
    <div class="avatar photo-avatar">
        <img src="images/avatar.jpg" alt="你的名字的头像" class="avatar-img">
    </div>
</div>

        <!-- 标题区域 - 优雅线条装饰 -->
        <div class="title-wrapper">
            <h1 class="elegant-title">黄韵锦</h1>
            <div class="title-lines">
                <svg class="line-svg" width="300" height="60" viewBox="0 0 300 60">
                    <path class="line-path" d="M20,30 L280,30" stroke="url(#grad1)" stroke-width="1.5" fill="none"/>
                    <path class="line-path delay-1" d="M40,20 L260,20" stroke="url(#grad2)" stroke-width="1" fill="none"/>
                    <path class="line-path delay-2" d="M60,40 L240,40" stroke="url(#grad3)" stroke-width="1" fill="none"/>
                    <defs>
                        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" style="stop-color:#667eea;stop-opacity:0" />
                            <stop offset="20%" style="stop-color:#667eea;stop-opacity:1" />
                            <stop offset="80%" style="stop-color:#764ba2;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#764ba2;stop-opacity:0" />
                        </linearGradient>
                        <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:0" />
                            <stop offset="30%" style="stop-color:#ff6b6b;stop-opacity:0.8" />
                            <stop offset="70%" style="stop-color:#4ecdc4;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#4ecdc4;stop-opacity:0" />
                        </linearGradient>
                        <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" style="stop-color:#feca57;stop-opacity:0" />
                            <stop offset="40%" style="stop-color:#feca57;stop-opacity:0.6" />
                            <stop offset="60%" style="stop-color:#ff9ff3;stop-opacity:0.6" />
                            <stop offset="100%" style="stop-color:#ff9ff3;stop-opacity:0" />
                        </linearGradient>
                    </defs>
                </svg>
            </div>
        </div>
        
        <p class="subtitle animate-typing">热爱交流的探索者 | 数模协会成员</p>
        
        <!-- 下滑提示区域 -->
        <div class="scroll-hint">
            <span class="hint-text">下滑查看更多内容</span>
            <div class="arrow-down">
                <span class="arrow"></span>
                <span class="arrow"></span>
                <span class="arrow"></span>
            </div>
        </div>

        <!-- 简介卡片 -->
        <div class="intro-card">
            <p class="intro-text">
                ✨ 大家好！我是数字媒体技术专业2025级的学生。我相信每一次思想的碰撞都能擦出新的火花。
            </p>
        </div>

        <!-- 导航卡片区域 - 只有三个板块 -->
        <div class="nav-cards">
            <!-- 关于我卡片 -->
            <div class="nav-card" onclick="location.href='about.html'">
                <div class="card-icon"><i class="fas fa-user"></i></div>
                <h3>关于我</h3>
                <p>背景、兴趣与方向</p>
                <span class="card-link">了解更多 →</span>
            </div>

            <!-- 学海拾贝卡片（技能展示） -->
            <div class="nav-card" onclick="location.href='skills.html'">
                <div class="card-icon"><i class="fas fa-cube"></i></div>
                <h3>📚 学海拾贝</h3>
                <p>编程·数学·工具</p>
                <span class="card-link">探索技能树 →</span>
            </div>

            <!-- 我的思考卡片 -->
            <div class="nav-card" onclick="location.href='thinking.html'">
                <div class="card-icon"><i class="fas fa-lightbulb"></i></div>
                <h3>我的思考</h3>
                <p>为什么要加入讨论组</p>
                <span class="card-link">了解更多 →</span>
            </div>
        </div>

       <!-- 联系方式 - 直接显示邮箱 -->
<div class="contact-info">
    <div class="email-display">
        <i class="fas fa-envelope"></i>
        <span>553468495@qq.com</span>
    </div>
</div>

        <!-- 返回顶部按钮 -->
        <button onclick="scrollToTop()" class="scroll-top" id="scrollTop">
            <i class="fas fa-arrow-up"></i>
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
